<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morning Bias Tool</title>
<style>
:root {
  --bg:     #0d0d1a; --panel:  #13132b; --card:   #1a1a35;
  --border: #252545; --text:   #e2e8f0; --muted:  #64748b;
  --bull: #22c55e; --bull-dim: #14532d; --bull-bg: rgba(34,197,94,.10);
  --bear: #ef4444; --bear-dim: #7f1d1d; --bear-bg: rgba(239,68,68,.10);
  --avoid: #f97316; --avoid-bg: rgba(249,115,22,.10);
  --chop: #facc15;
  --ac: #e8b84b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;padding:20px 14px 60px}

/* HEADER */
.hdr{text-align:center;margin-bottom:24px}
.hdr h1{font-size:clamp(1.25rem,3.5vw,1.85rem);font-weight:800;letter-spacing:-.02em;color:var(--ac);margin-bottom:4px}
.hdr p{font-size:.8rem;color:var(--muted)}
.today{font-size:.73rem;color:var(--muted);margin-top:6px}
.today b{color:var(--text)}

/* ASSET TABS */
.tabs{display:flex;gap:8px;max-width:880px;margin:0 auto 20px;overflow-x:auto;padding:2px 2px 6px}
.tab{flex:1;min-width:110px;background:var(--card);border:2px solid var(--border);border-radius:12px;padding:11px 8px 9px;cursor:pointer;text-align:center;transition:border-color .18s,background .18s;position:relative}
.tab .tsym{font-size:1.1rem;font-weight:800;margin-bottom:1px;transition:color .18s}
.tab .tname{font-size:.65rem;color:var(--muted);white-space:nowrap}
.tab .tbar{position:absolute;bottom:0;left:12px;right:12px;height:3px;border-radius:3px 3px 0 0;background:var(--ac);opacity:0;transition:.18s}
.tab.active .tbar{opacity:1}
.tab.active{border-color:var(--ac);background:rgba(255,255,255,.03)}
.tab.active .tsym{color:var(--ac)}
.tab:not(.active):hover{border-color:rgba(255,255,255,.18)}

/* LAYOUT */
.wrap{max-width:880px;margin:0 auto}
.grid{display:grid;gap:14px;grid-template-columns:1fr}
@media(min-width:680px){.grid{grid-template-columns:1fr 1fr}}
.grid.single{grid-template-columns:1fr}

/* PANE */
.pane{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px}
.pane-hd{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.pane-hd::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--ac);flex-shrink:0}

/* NOTE BANNER */
.note-banner{background:rgba(255,255,255,.03);border:1px solid var(--border);border-left:3px solid var(--ac);border-radius:0 8px 8px 0;font-size:.73rem;color:var(--muted);padding:8px 12px;margin-bottom:14px;line-height:1.5}

/* PARAM GROUP */
.pg{margin-bottom:15px}
.pg:last-child{margin-bottom:0}
.pg-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.pg-time{font-size:.62rem;background:var(--card);border:1px solid var(--border);border-radius:5px;padding:2px 7px;letter-spacing:.02em}

/* OPTION BUTTONS */
.opt-list{display:flex;flex-direction:column;gap:5px}
.opt{background:var(--card);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-size:.8rem;font-weight:500;padding:8px 11px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:all .14s;line-height:1.3;width:100%}
.opt .ico{width:20px;text-align:center;flex-shrink:0;font-size:.95rem}
.opt .sub{font-size:.64rem;color:var(--muted);display:block;margin-top:1px;transition:.14s}
.opt:hover{border-color:var(--ac);color:var(--ac)}
.opt.active{border-color:var(--ac);background:rgba(255,255,255,.04);color:var(--ac);font-weight:700}
.opt.active .sub{color:color-mix(in srgb,var(--ac) 55%,var(--muted))}
/* per-side active colours */
.opt.ob.active{border-color:var(--bull);background:var(--bull-bg);color:var(--bull)}
.opt.ob.active .sub{color:color-mix(in srgb,var(--bull) 55%,var(--muted))}
.opt.or.active{border-color:var(--bear);background:var(--bear-bg);color:var(--bear)}
.opt.or.active .sub{color:color-mix(in srgb,var(--bear) 55%,var(--muted))}
.opt.oa.active{border-color:var(--avoid);background:var(--avoid-bg);color:var(--avoid)}
.opt.oa.active .sub{color:color-mix(in srgb,var(--avoid) 55%,var(--muted))}

/* RESULTS */
.res-pane{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;min-height:200px}
.prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:50px 20px;color:var(--muted)}
.prompt-ico{font-size:2.5rem;margin-bottom:12px}
.prompt p{font-size:.85rem} .prompt b{color:var(--text)}

/* RESULT CARD */
.rc{animation:fadeUp .28s ease}

/* Today tags */
.sel-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.stag{font-size:.65rem;font-weight:700;padding:3px 9px;border-radius:99px;border:1px solid;white-space:nowrap}
.stag-bull{background:var(--bull-bg);border-color:var(--bull);color:var(--bull)}
.stag-bear{background:var(--bear-bg);border-color:var(--bear);color:var(--bear)}
.stag-avoid{background:var(--avoid-bg);border-color:var(--avoid);color:var(--avoid)}
.stag-neut{background:var(--card);border-color:var(--border);color:var(--muted)}

/* Verdict + grade row */
.verdict-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap}
.verdict{flex:1;min-width:200px;border-radius:11px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.verdict.vb{background:var(--bull-bg);border:1.5px solid rgba(34,197,94,.3)}
.verdict.vr{background:var(--bear-bg);border:1.5px solid rgba(239,68,68,.3)}
.verdict.va{background:var(--avoid-bg);border:1.5px solid rgba(249,115,22,.3)}
.verdict.vn{background:rgba(100,116,139,.07);border:1.5px solid rgba(100,116,139,.25)}
.v-ico{font-size:1.9rem;flex-shrink:0}
.v-lbl{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:3px}
.v-title{font-size:1.05rem;font-weight:800}
.v-sub{font-size:.72rem;color:var(--muted);margin-top:3px}

.grade-box{flex-shrink:0;text-align:center;background:var(--card);border:2px solid var(--border);border-radius:12px;padding:10px 14px;min-width:76px}
.gb-g{font-size:1.65rem;font-weight:900;line-height:1}
.gb-l{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.gaplus{color:var(--ac);border-color:var(--ac)!important}
.ga   {color:var(--bull)}
.gb   {color:var(--chop)}
.gavoid{color:var(--avoid);border-color:var(--avoid)!important;background:var(--avoid-bg)!important}

/* Score bars (XAUUSD, US30) */
.score-sec{margin-bottom:16px}
.sec-lbl{font-size:.67rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:7px}
.sbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sbar-nm{font-size:.73rem;font-weight:600;width:48px;flex-shrink:0}
.sbar-track{flex:1;height:9px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.sbar-fill{height:100%;border-radius:99px;transition:width .55s cubic-bezier(.4,0,.2,1)}
.sf-bull{background:linear-gradient(90deg,var(--bull-dim),var(--bull))}
.sf-bear{background:linear-gradient(90deg,var(--bear-dim),var(--bear))}
.sbar-val{font-size:.75rem;font-weight:700;width:38px;text-align:right;flex-shrink:0}

/* Signal pills (SP500, GER40) */
.sig-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.spill{font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:99px;border:1px solid}
.spill-bull{background:var(--bull-bg);border-color:var(--bull);color:var(--bull)}
.spill-bear{background:var(--bear-bg);border-color:var(--bear);color:var(--bear)}
.spill-neut{background:var(--card);border-color:var(--border);color:var(--muted)}

/* Conditions */
.cond-sec{margin-bottom:14px}
.cond-list{display:flex;flex-direction:column;gap:4px}
.cond-item{display:flex;align-items:center;gap:8px;font-size:.78rem;padding:7px 10px;border-radius:8px;background:var(--card)}
.ci-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ci-txt{flex:1}
.ci-pts{font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:5px;white-space:nowrap}
.ci-bull{color:var(--bull)} .ci-pts-bull{background:var(--bull-bg);color:var(--bull)}
.ci-bear{color:var(--bear)} .ci-pts-bear{background:var(--bear-bg);color:var(--bear)}
.ci-neut{color:var(--muted)}.ci-pts-neut{background:var(--card);color:var(--muted);border:1px solid var(--border)}
.ci-avoid{color:var(--avoid)}.ci-pts-avoid{background:var(--avoid-bg);color:var(--avoid)}

/* Hard avoid banner */
.hard-avoid{background:var(--avoid-bg);border:1.5px solid rgba(249,115,22,.4);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;font-size:.8rem;font-weight:600;color:var(--avoid)}
.ha-ico{font-size:1.4rem;flex-shrink:0}

/* ADR widget */
.adr{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px;margin-top:14px}
.adr-hd{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:11px}
.adr-in{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.adr-field label{font-size:.63rem;color:var(--muted);display:block;margin-bottom:4px}
.adr-field input{width:100%;background:var(--panel);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:.82rem;font-family:inherit;padding:7px 8px;outline:none;transition:.14s}
.adr-field input:focus{border-color:var(--ac)}
.adr-out{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.adr-stat{background:var(--panel);border-radius:8px;padding:10px;text-align:center}
.adr-v{font-size:1.15rem;font-weight:800;margin-bottom:2px}
.adr-l{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.adr-msg{font-size:.73rem;font-weight:600;padding:7px 10px;border-radius:7px}

/* Reset */
.reset-btn{display:block;margin:14px auto 0;background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:.72rem;font-family:inherit;padding:6px 18px;cursor:pointer;transition:.14s}
.reset-btn:hover{border-color:var(--text);color:var(--text)}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="hdr">
  <h1 id="hdrTitle">Morning Bias Tool</h1>
  <p>Select your asset · Enter today's session conditions · Get your statistical bias</p>
  <div class="today" id="todayLine"></div>
</div>

<div class="wrap">
  <div class="tabs" id="tabs"></div>
  <div class="grid" id="grid">
    <div class="pane" id="pane1"><div class="pane-hd" id="phd1">Inputs</div><div id="pbody1"></div></div>
    <div class="pane" id="pane2" style="display:none"><div class="pane-hd" id="phd2">Inputs</div><div id="pbody2"></div></div>
    <div class="res-pane" id="resPaneEl">
      <div class="prompt"><div class="prompt-ico">⚡</div><p><b>Select an asset above</b><br>then fill in all conditions</p></div>
    </div>
  </div>
</div>

<script>
// ═══════════════ ASSET CONFIGS ═══════════════

const ASSETS = {

  xauusd:{
    id:'xauusd', sym:'XAU', name:'XAUUSD', label:'Gold', color:'#e8b84b',
    col1:['asia_dir','asia_liq'], col2:['pos_1100','acceptance'],
    note:'Score bullish & bearish points separately. The dominant score determines grade.',
    params:[
      {id:'asia_dir', label:'Asia Direction', time:'00:00 – 07:00 UK',
       opts:[
         {v:'bull',ico:'▲',lbl:'Bullish Close',sub:'Close above open',cls:'ob'},
         {v:'bear',ico:'▼',lbl:'Bearish Close',sub:'Close below open',cls:'or'},
       ]},
      {id:'asia_liq', label:'Asia Liquidity Taken', time:'07:00 onwards',
       opts:[
         {v:'high_only',ico:'↑',lbl:'Asia High only',   sub:'Low survives — Bull (+2)',cls:'ob'},
         {v:'low_only', ico:'↓',lbl:'Asia Low only',    sub:'High survives — Bear (+2)',cls:'or'},
         {v:'both',     ico:'✕',lbl:'Both sides swept',  sub:'Hard avoid — model invalid',cls:'oa'},
       ]},
      {id:'pos_1100', label:'11:00 UK Price Position', time:'11:00 UK',
       opts:[
         {v:'above_pdh', ico:'▲▲',lbl:'Above PDH',        sub:'Strong Bull — +2 pts',cls:'ob'},
         {v:'above_high',ico:'▲', lbl:'Above Asia High',   sub:'Bull — +1 pt',cls:'ob'},
         {v:'inside',    ico:'↔', lbl:'Inside Asia Range', sub:'Weak — no A+',cls:''},
         {v:'below_low', ico:'▼', lbl:'Below Asia Low',    sub:'Bear — +1 pt',cls:'or'},
         {v:'below_pdl', ico:'▼▼',lbl:'Below PDL',         sub:'Strong Bear — +2 pts',cls:'or'},
       ]},
      {id:'acceptance', label:'Acceptance (10:00 – 11:00)', time:'Hold check',
       opts:[
         {v:'above',  ico:'✓',lbl:'Accepted above Asia High',sub:'A+ Bull confirm — +2 pts',cls:'ob'},
         {v:'below',  ico:'✓',lbl:'Accepted below Asia Low', sub:'A+ Bear confirm — +2 pts',cls:'or'},
         {v:'returns',ico:'✗',lbl:'Breaks then returns inside',sub:'No A+ — range hold failed',cls:'oa'},
       ]},
    ],
    score(s){
      if(s.asia_liq==='both') return {
        hardAvoid:true, reason:'Both Asia High & Low swept. Model is invalid today.',
        grade:'Avoid', dominant:'avoid', bull:0, bear:0, maxBull:7, maxBear:7, conds:[]
      };
      let bull=0, bear=0; const conds=[];
      if(s.asia_dir==='bull'){bull+=1;conds.push({t:'Bullish Asia',p:'+1',s:'bull'});}
      if(s.asia_dir==='bear'){bear+=1;conds.push({t:'Bearish Asia',p:'+1',s:'bear'});}
      if(s.asia_liq==='high_only'){bull+=2;conds.push({t:'Asia High only taken',p:'+2',s:'bull'});}
      if(s.asia_liq==='low_only') {bear+=2;conds.push({t:'Asia Low only taken', p:'+2',s:'bear'});}
      if(s.pos_1100==='above_pdh') {bull+=2;conds.push({t:'11:00 above PDH (incl. Asia High)',p:'+2',s:'bull'});}
      if(s.pos_1100==='above_high'){bull+=1;conds.push({t:'11:00 above Asia High',p:'+1',s:'bull'});}
      if(s.pos_1100==='inside')    {conds.push({t:'11:00 inside Asia Range',p:'0',s:'neut',n:'No A+'});}
      if(s.pos_1100==='below_low') {bear+=1;conds.push({t:'11:00 below Asia Low', p:'+1',s:'bear'});}
      if(s.pos_1100==='below_pdl') {bear+=2;conds.push({t:'11:00 below PDL (incl. Asia Low)',p:'+2',s:'bear'});}
      if(s.acceptance==='above')  {bull+=2;conds.push({t:'Accepted above Asia High',p:'+2',s:'bull'});}
      if(s.acceptance==='below')  {bear+=2;conds.push({t:'Accepted below Asia Low', p:'+2',s:'bear'});}
      if(s.acceptance==='returns'){conds.push({t:'Breaks then returns inside range',p:'0',s:'avoid',n:'No A+'});}
      const dom=bull>bear?'bull':bear>bull?'bear':'neut';
      const sc=Math.max(bull,bear);
      let g=sc>=5?'A+':sc>=3?'A':sc>=1?'B':'Avoid';
      if(s.acceptance==='returns'&&g==='A+') g='A';
      if(s.pos_1100==='inside'&&g==='A+') g='A';
      return {grade:g, dominant:dom, bull, bear, maxBull:7, maxBear:7, conds};
    },
    showADR:true
  },

  us30:{
    id:'us30', sym:'US30', name:'US30', label:'Dow Jones', color:'#60a5fa',
    col1:['pdh_pdl','asia_pos'], col2:['liq_seq','london_pos'],
    note:'No A+ bias before 14:30 UK. Score only what is true at 14:30 UK time.',
    params:[
      {id:'pdh_pdl', label:'Price vs PDH / PDL', time:'14:30 UK check',
       opts:[
         {v:'above_pdh',ico:'▲',lbl:'Above PDH',         sub:'+3 pts — Strong bull',cls:'ob'},
         {v:'between',  ico:'↔',lbl:'Between PDH & PDL', sub:'0 pts — Neutral',cls:''},
         {v:'below_pdl',ico:'▼',lbl:'Below PDL',         sub:'+3 pts — Strong bear',cls:'or'},
       ]},
      {id:'asia_pos', label:'Price vs Asia Range', time:'14:30 UK check',
       opts:[
         {v:'above_high',ico:'▲',lbl:'Above Asia High', sub:'+3 pts — Bull',cls:'ob'},
         {v:'inside',    ico:'↔',lbl:'Inside Asia',     sub:'0 pts — Neutral',cls:''},
         {v:'below_low', ico:'▼',lbl:'Below Asia Low',  sub:'+3 pts — Bear',cls:'or'},
       ]},
      {id:'liq_seq', label:'Asia Liquidity Sequence', time:'Observed by 14:30',
       opts:[
         {v:'bull',ico:'↑',lbl:'Bullish sequence',  sub:'Low swept first, reversed up — +2',cls:'ob'},
         {v:'neut',ico:'↔',lbl:'Neutral / unclear', sub:'0 pts',cls:''},
         {v:'bear',ico:'↓',lbl:'Bearish sequence',  sub:'High swept first, reversed down — +2',cls:'or'},
       ]},
      {id:'london_pos', label:'Price vs London Range', time:'14:30 UK check',
       opts:[
         {v:'above_high',ico:'▲',lbl:'Above London High', sub:'+2 pts — Bull',cls:'ob'},
         {v:'inside',    ico:'↔',lbl:'Inside London',     sub:'0 pts — Neutral',cls:''},
         {v:'below_low', ico:'▼',lbl:'Below London Low',  sub:'+2 pts — Bear',cls:'or'},
       ]},
    ],
    score(s){
      let bull=0, bear=0; const conds=[];
      if(s.pdh_pdl==='above_pdh')  {bull+=3;conds.push({t:'Price above PDH',p:'+3',s:'bull'});}
      if(s.pdh_pdl==='below_pdl')  {bear+=3;conds.push({t:'Price below PDL',p:'+3',s:'bear'});}
      if(s.pdh_pdl==='between')    {conds.push({t:'Price between PDH & PDL',p:'0',s:'neut'});}
      if(s.asia_pos==='above_high'){bull+=3;conds.push({t:'Price above Asia High',p:'+3',s:'bull'});}
      if(s.asia_pos==='below_low') {bear+=3;conds.push({t:'Price below Asia Low', p:'+3',s:'bear'});}
      if(s.asia_pos==='inside')    {conds.push({t:'Price inside Asia range',p:'0',s:'neut'});}
      if(s.liq_seq==='bull')       {bull+=2;conds.push({t:'Bullish Asia liquidity sequence',p:'+2',s:'bull'});}
      if(s.liq_seq==='bear')       {bear+=2;conds.push({t:'Bearish Asia liquidity sequence',p:'+2',s:'bear'});}
      if(s.liq_seq==='neut')       {conds.push({t:'Neutral Asia liquidity',p:'0',s:'neut'});}
      if(s.london_pos==='above_high'){bull+=2;conds.push({t:'Price above London High',p:'+2',s:'bull'});}
      if(s.london_pos==='below_low') {bear+=2;conds.push({t:'Price below London Low', p:'+2',s:'bear'});}
      if(s.london_pos==='inside')    {conds.push({t:'Price inside London range',p:'0',s:'neut'});}
      const conflict = bull>0&&bear>0;
      const dom=bull>bear?'bull':bear>bull?'bear':'neut';
      const sc=Math.max(bull,bear);
      let g;
      if(conflict&&Math.min(bull,bear)>=4) g='Avoid';
      else if(sc>=8) g='A+';
      else if(sc>=6) g='A';
      else if(sc>=4) g='B';
      else g='Avoid';
      return {grade:g, dominant:dom, bull, bear, maxBull:10, maxBear:10, conds, conflict};
    },
    showADR:false
  },

  sp500:{
    id:'sp500', sym:'SPX', name:'S&P 500', label:'E-Mini', color:'#34d399',
    col1:['asia_liq','london_orb'], col2:['pos_1430','pos_1530'],
    note:'Do not force a bias before 14:30. A+ requires all 4 signals aligned in one direction.',
    params:[
      {id:'asia_liq', label:'Asia Liquidity', time:'After 08:00 UK',
       opts:[
         {v:'high_only',ico:'↑',lbl:'Asia High only swept',  sub:'A+ Bull signal — strongest',cls:'ob'},
         {v:'low_only', ico:'↓',lbl:'Asia Low only swept',   sub:'A+ Bear signal — strongest',cls:'or'},
         {v:'both',     ico:'✕',lbl:'Both sides swept',       sub:'Avoid — no confidence',cls:'oa'},
       ]},
      {id:'london_orb', label:'London ORB / IB Break', time:'08:00 – 10:00 UK',
       opts:[
         {v:'high_only',ico:'↑',lbl:'High only broken',  sub:'A+ Bull signal',cls:'ob'},
         {v:'low_only', ico:'↓',lbl:'Low only broken',   sub:'A+ Bear signal',cls:'or'},
         {v:'both',     ico:'✕',lbl:'Both sides broken',  sub:'Avoid — reduce confidence',cls:'oa'},
       ]},
      {id:'pos_1430', label:'Price Position vs Asia', time:'14:30 UK — Provisional',
       opts:[
         {v:'above',ico:'▲',lbl:'Above Asia High',   sub:'A Bullish bias',cls:'ob'},
         {v:'inside',ico:'↔',lbl:'Inside Asia Range', sub:'No trade — wait for 15:30',cls:''},
         {v:'below',ico:'▼',lbl:'Below Asia Low',    sub:'A Bearish bias',cls:'or'},
       ]},
      {id:'pos_1530', label:'Price Position vs Asia', time:'15:30 UK — Final Confirm',
       opts:[
         {v:'above',ico:'▲',lbl:'Above Asia High',   sub:'A+ Bullish confirm',cls:'ob'},
         {v:'inside',ico:'↔',lbl:'Inside Asia Range', sub:'Avoid — no bias',cls:'oa'},
         {v:'below',ico:'▼',lbl:'Below Asia Low',    sub:'A+ Bearish confirm',cls:'or'},
       ]},
    ],
    score(s){
      let bS=0, rS=0, avoid=false; const conds=[];
      if(s.asia_liq==='high_only'){bS++;conds.push({t:'Asia High only swept (strongest signal)',p:'Bull ✓',s:'bull'});}
      if(s.asia_liq==='low_only') {rS++;conds.push({t:'Asia Low only swept (strongest signal)', p:'Bear ✓',s:'bear'});}
      if(s.asia_liq==='both')     {avoid=true;conds.push({t:'Both Asia sides swept',p:'⛔ Avoid',s:'avoid'});}
      if(s.london_orb==='high_only'){bS++;conds.push({t:'London ORB/IB high only broken',p:'Bull ✓',s:'bull'});}
      if(s.london_orb==='low_only') {rS++;conds.push({t:'London ORB/IB low only broken', p:'Bear ✓',s:'bear'});}
      if(s.london_orb==='both')     {avoid=true;conds.push({t:'Both London ORB sides broken',p:'⛔ Avoid',s:'avoid'});}
      if(s.pos_1430==='above') {bS++;conds.push({t:'14:30 — above Asia High',p:'Bull ✓',s:'bull'});}
      if(s.pos_1430==='below') {rS++;conds.push({t:'14:30 — below Asia Low', p:'Bear ✓',s:'bear'});}
      if(s.pos_1430==='inside'){conds.push({t:'14:30 — inside Asia range',p:'Neutral',s:'neut'});}
      if(s.pos_1530==='above') {bS++;conds.push({t:'15:30 — above Asia High (key confirm)',p:'Bull ✓',s:'bull'});}
      if(s.pos_1530==='below') {rS++;conds.push({t:'15:30 — below Asia Low (key confirm)', p:'Bear ✓',s:'bear'});}
      if(s.pos_1530==='inside'){avoid=true;conds.push({t:'15:30 — inside Asia range',p:'⛔ Avoid',s:'avoid'});}
      const mixed=bS>0&&rS>0;
      const dom=bS>rS?'bull':rS>bS?'bear':'neut';
      const sig=Math.max(bS,rS);
      let g;
      if(avoid||mixed) g='Avoid';
      else if(sig===4) g='A+';
      else if(sig===3) g='A';
      else if(sig===2) g='B';
      else g='Avoid';
      return {grade:g,dominant:dom,bullSig:bS,bearSig:rS,conds,avoid,signalMode:true,total:4};
    },
    showADR:false
  },

  ger40:{
    id:'ger40', sym:'GER40', name:'GER40', label:'DAX', color:'#c084fc',
    col1:['pdh_pdl','asia_range','pos_1000'], col2:['london_dir','orb_filter'],
    note:'Final bias at 10:00 UK. A+ requires all 5 checks confirmed in one direction.',
    params:[
      {id:'pdh_pdl', label:'PDH / PDL Status', time:'M15 close check',
       opts:[
         {v:'above_pdh',ico:'▲',lbl:'Closed above PDH',     sub:'PDL not taken — Bull ✓',cls:'ob'},
         {v:'below_pdl',ico:'▼',lbl:'Closed below PDL',     sub:'PDH not taken — Bear ✓',cls:'or'},
         {v:'both',     ico:'✕',lbl:'Both PDH & PDL swept',  sub:'Avoid',cls:'oa'},
         {v:'neither',  ico:'↔',lbl:'Neither taken',          sub:'Neutral / no signal',cls:''},
       ]},
      {id:'asia_range', label:'Asia Range — Strongest Layer', time:'M15 close check',
       opts:[
         {v:'above_high',ico:'↑',lbl:'M15 closed above Asia High',sub:'Asia Low intact — Bull ✓',cls:'ob'},
         {v:'below_low', ico:'↓',lbl:'M15 closed below Asia Low', sub:'Asia High intact — Bear ✓',cls:'or'},
         {v:'both',      ico:'✕',lbl:'Both Asia sides taken',       sub:'Avoid',cls:'oa'},
       ]},
      {id:'pos_1000', label:'Price Position at 10:00 UK', time:'10:00 UK — Decision time',
       opts:[
         {v:'above_high',ico:'▲',lbl:'Above Asia High',      sub:'Bullish ✓',cls:'ob'},
         {v:'below_low', ico:'▼',lbl:'Below Asia Low',       sub:'Bearish ✓',cls:'or'},
         {v:'inside',    ico:'↔',lbl:'Inside Asia range',    sub:'Avoid',cls:'oa'},
         {v:'middle',    ico:'—',lbl:'Middle of Asia range', sub:'Strong avoid',cls:'oa'},
       ]},
      {id:'london_dir', label:'London Direction (08:00 – 10:00)', time:'08:00 – 10:00 UK',
       opts:[
         {v:'bull',    ico:'▲',lbl:'Bullish + above Asia High',    sub:'Confirms bull ✓',cls:'ob'},
         {v:'bear',    ico:'▼',lbl:'Bearish + below Asia Low',     sub:'Confirms bear ✓',cls:'or'},
         {v:'conflict',ico:'✕',lbl:'Direction conflicts Asia pos.', sub:'Reduce quality or avoid',cls:'oa'},
       ]},
      {id:'orb_filter', label:'ORB / IB Filter', time:'08:00 – 09:00 UK',
       opts:[
         {v:'high_only',ico:'↑',lbl:'ORB High broken (not low)', sub:'Bull confirm ✓',cls:'ob'},
         {v:'low_only', ico:'↓',lbl:'ORB Low broken (not high)', sub:'Bear confirm ✓',cls:'or'},
         {v:'both',     ico:'✕',lbl:'Both ORB sides broken',      sub:'Avoid',cls:'oa'},
       ]},
    ],
    score(s){
      let bC=0, rC=0, avoid=false; const conds=[];
      if(s.pdh_pdl==='above_pdh'){bC++;conds.push({t:'Closed above PDH (PDL intact)',p:'Bull ✓',s:'bull'});}
      else if(s.pdh_pdl==='below_pdl'){rC++;conds.push({t:'Closed below PDL (PDH intact)',p:'Bear ✓',s:'bear'});}
      else if(s.pdh_pdl==='both'){avoid=true;conds.push({t:'Both PDH & PDL swept',p:'⛔ Avoid',s:'avoid'});}
      else{conds.push({t:'Neither PDH nor PDL taken',p:'Neutral',s:'neut'});}
      if(s.asia_range==='above_high'){bC++;conds.push({t:'M15 closed above Asia High (strongest)',p:'Bull ✓',s:'bull'});}
      else if(s.asia_range==='below_low'){rC++;conds.push({t:'M15 closed below Asia Low (strongest)',p:'Bear ✓',s:'bear'});}
      else{avoid=true;conds.push({t:'Both Asia sides taken',p:'⛔ Avoid',s:'avoid'});}
      if(s.pos_1000==='above_high'){bC++;conds.push({t:'Price above Asia High at 10:00',p:'Bull ✓',s:'bull'});}
      else if(s.pos_1000==='below_low'){rC++;conds.push({t:'Price below Asia Low at 10:00',p:'Bear ✓',s:'bear'});}
      else{avoid=true;conds.push({t:'Price inside / middle Asia range at 10:00',p:'⛔ Avoid',s:'avoid'});}
      if(s.london_dir==='bull'){bC++;conds.push({t:'London bullish direction + above Asia High',p:'Bull ✓',s:'bull'});}
      else if(s.london_dir==='bear'){rC++;conds.push({t:'London bearish direction + below Asia Low',p:'Bear ✓',s:'bear'});}
      else{avoid=true;conds.push({t:'London direction conflicts Asia position',p:'⛔ Avoid',s:'avoid'});}
      if(s.orb_filter==='high_only'){bC++;conds.push({t:'ORB high only broken (low intact)',p:'Bull ✓',s:'bull'});}
      else if(s.orb_filter==='low_only'){rC++;conds.push({t:'ORB low only broken (high intact)',p:'Bear ✓',s:'bear'});}
      else{avoid=true;conds.push({t:'Both ORB sides broken',p:'⛔ Avoid',s:'avoid'});}
      const mixed=bC>0&&rC>0;
      const dom=bC>rC?'bull':rC>bC?'bear':'neut';
      const checks=Math.max(bC,rC);
      let g;
      if(avoid||mixed) g='Avoid';
      else if(checks===5) g='A+';
      else if(checks===4) g='A';
      else if(checks===3) g='B';
      else g='Avoid';
      return {grade:g,dominant:dom,bullChecks:bC,bearChecks:rC,conds,avoid,signalMode:true,total:5};
    },
    showADR:false
  }
};

// ═══════════════ STATE ═══════════════
let active = 'xauusd';
const sel = {xauusd:{}, us30:{}, sp500:{}, ger40:{}};

// ═══════════════ TABS ═══════════════
function buildTabs(){
  const c = document.getElementById('tabs');
  c.innerHTML = '';
  Object.values(ASSETS).forEach(a => {
    const t = document.createElement('div');
    t.className = 'tab' + (a.id===active?' active':'');
    t.innerHTML = `<div class="tsym" style="color:${a.id===active?a.color:'var(--muted)'}">${a.sym}</div><div class="tname">${a.label}</div><div class="tbar" style="background:${a.color}"></div>`;
    t.onclick = () => switchAsset(a.id);
    c.appendChild(t);
  });
}

function switchAsset(id){
  active = id;
  const a = ASSETS[id];
  document.documentElement.style.setProperty('--ac', a.color);
  document.getElementById('hdrTitle').textContent = a.name + ' — Morning Bias';
  buildTabs();
  renderParams();
  renderResults();
}

// ═══════════════ PARAMS ═══════════════
function renderParams(){
  const a = ASSETS[active];
  const allParams = a.params;
  const col1 = a.col1 ? allParams.filter(p=>a.col1.includes(p.id)) : allParams;
  const col2 = a.col2 ? allParams.filter(p=>a.col2.includes(p.id)) : [];

  const grid = document.getElementById('grid');
  const p2 = document.getElementById('pane2');
  const rp = document.getElementById('resPaneEl');

  // Pane 1
  document.getElementById('phd1').innerHTML = `<span style="background:${a.color}" class="pane-hd-dot"></span>${a.name} — Session Inputs`;
  document.getElementById('pbody1').innerHTML = '';
  if(a.note){
    const nb = document.createElement('div');
    nb.className = 'note-banner';
    nb.textContent = a.note;
    document.getElementById('pbody1').appendChild(nb);
  }
  col1.forEach(p => buildParamGroup(p, document.getElementById('pbody1')));

  // Pane 2
  if(col2.length){
    p2.style.display = '';
    document.getElementById('phd2').innerHTML = `<span style="background:${a.color}" class="pane-hd-dot"></span>${a.name} — Position & Confirm`;
    document.getElementById('pbody2').innerHTML = '';
    col2.forEach(p => buildParamGroup(p, document.getElementById('pbody2')));
    // Results spans full width on large screen
    grid.style.gridTemplateColumns = '';
    rp.style.gridColumn = '';
    grid.className = 'grid';
  } else {
    p2.style.display = 'none';
    grid.className = 'grid single';
  }
}

function buildParamGroup(param, container){
  const div = document.createElement('div');
  div.className = 'pg';
  div.innerHTML = `<div class="pg-label">${param.label}${param.time?`<span class="pg-time">${param.time}</span>`:''}</div>`;
  const list = document.createElement('div');
  list.className = 'opt-list';
  param.opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt' + (opt.cls?' '+opt.cls:'');
    if(sel[active][param.id]===opt.v) btn.classList.add('active');
    btn.innerHTML = `<span class="ico">${opt.ico||'·'}</span><span><span>${opt.lbl}</span>${opt.sub?`<span class="sub">${opt.sub}</span>`:''}</span>`;
    btn.onclick = () => { sel[active][param.id]=opt.v; renderParams(); renderResults(); };
    list.appendChild(btn);
  });
  div.appendChild(list);
  container.appendChild(div);
}

// ═══════════════ RESULTS ═══════════════
function renderResults(){
  const a = ASSETS[active];
  const s = sel[active];
  const rp = document.getElementById('resPaneEl');
  const needed = a.params.map(p=>p.id);
  const missing = needed.filter(id=>s[id]===undefined);

  if(missing.length){
    const labels = missing.map(id=>a.params.find(p=>p.id===id).label).join(', ');
    rp.innerHTML = `<div class="prompt"><div class="prompt-ico">⚡</div><p><b>Still needed (${missing.length})</b><br>${labels}</p></div>`;
    return;
  }

  const r = a.score(s);
  const gradeClass = {'A+':'gaplus','A':'ga','B':'gb','Avoid':'gavoid'}[r.grade]||'gavoid';
  const dom = r.dominant;
  const isAvoid = r.grade==='Avoid';
  const vClass = isAvoid?'va':dom==='bull'?'vb':dom==='bear'?'vr':'vn';
  const vIco   = isAvoid?'⛔':dom==='bull'?'📈':dom==='bear'?'📉':'↔️';
  const vColor  = isAvoid?'var(--avoid)':dom==='bull'?'var(--bull)':dom==='bear'?'var(--bear)':'var(--muted)';
  const biasLabel = isAvoid?'Avoid — No Clean Bias':dom==='bull'?`${r.grade} Bullish Bias`:dom==='bear'?`${r.grade} Bearish Bias`:'No Clear Direction';

  // Confidence note
  let confNote;
  if(!r.signalMode){
    const edge=Math.abs((r.bull||0)-(r.bear||0));
    confNote=edge>=5?'Strong directional edge':edge>=2?'Moderate lean — be selective':'Low edge — near coin flip';
  } else {
    const sig=Math.max(r.bullSig||r.bullChecks||0,r.bearSig||r.bearChecks||0);
    const tot=r.total||needed.length;
    confNote=`${sig}/${tot} signals aligned${isAvoid?' — conflict or avoid trigger':sig===tot?' — full conviction':''}`;
  }

  // Tags
  const tags = needed.map(id=>{
    const param=a.params.find(p=>p.id===id);
    const opt=param.opts.find(o=>o.v===s[id]);
    const tc=opt.cls==='ob'?'stag-bull':opt.cls==='or'?'stag-bear':opt.cls==='oa'?'stag-avoid':'stag-neut';
    return `<span class="stag ${tc}">${opt.ico} ${opt.lbl}</span>`;
  }).join('');

  // Score / signal visual
  let scoreHTML='';
  if(!r.signalMode){
    const bW=Math.min(100,Math.round((r.bull/r.maxBull)*100));
    const rW=Math.min(100,Math.round((r.bear/r.maxBear)*100));
    scoreHTML=`<div class="score-sec">
      <div class="sec-lbl">Score (max ${r.maxBull} pts each direction)</div>
      <div class="sbar-row">
        <span class="sbar-nm" style="color:var(--bull)">Bull</span>
        <div class="sbar-track"><div class="sbar-fill sf-bull" style="width:${bW}%"></div></div>
        <span class="sbar-val" style="color:var(--bull)">${r.bull}/${r.maxBull}</span>
      </div>
      <div class="sbar-row">
        <span class="sbar-nm" style="color:var(--bear)">Bear</span>
        <div class="sbar-track"><div class="sbar-fill sf-bear" style="width:${rW}%"></div></div>
        <span class="sbar-val" style="color:var(--bear)">${r.bear}/${r.maxBear}</span>
      </div>
    </div>`;
  } else {
    const bS=r.bullSig!==undefined?r.bullSig:r.bullChecks||0;
    const rS=r.bearSig!==undefined?r.bearSig:r.bearChecks||0;
    const tot=r.total||needed.length;
    let pills='';
    for(let i=0;i<tot;i++){
      if(i<bS&&dom==='bull') pills+=`<div class="spill spill-bull">● Bull</div>`;
      else if(i<rS&&dom==='bear') pills+=`<div class="spill spill-bear">● Bear</div>`;
      else pills+=`<div class="spill spill-neut">○</div>`;
    }
    scoreHTML=`<div style="margin-bottom:14px"><div class="sec-lbl" style="margin-bottom:7px">Signal alignment (${Math.max(bS,rS)}/${tot})</div><div class="sig-row">${pills}</div></div>`;
  }

  // Conditions
  const condHTML=r.conds.map(c=>`
    <div class="cond-item">
      <div class="ci-dot" style="background:${c.s==='bull'?'var(--bull)':c.s==='bear'?'var(--bear)':c.s==='avoid'?'var(--avoid)':'var(--muted)'}"></div>
      <div class="ci-txt ci-${c.s}">${c.t}${c.n?` <span style="font-size:.63rem;opacity:.65">(${c.n})</span>`:''}</div>
      <span class="ci-pts ci-pts-${c.s}">${c.p}</span>
    </div>`).join('');

  // Conflict note for US30
  const conflictHTML = r.conflict?`<div style="background:var(--avoid-bg);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:8px 12px;font-size:.75rem;color:var(--avoid);margin-bottom:12px">⚠️ Mixed signals — both bull and bear points are scoring. Review your inputs.</div>`:'';

  // ADR
  const adrHTML = a.showADR?`
    <div class="adr">
      <div class="adr-hd">⚡ ADR Filter — Daily Range Check</div>
      <div class="adr-in">
        <div class="adr-field"><label>ADR ($)</label><input type="number" id="aIn" placeholder="100" oninput="calcADR()"></div>
        <div class="adr-field"><label>Today's High</label><input type="number" id="aHi" placeholder="3400" oninput="calcADR()"></div>
        <div class="adr-field"><label>Today's Low</label><input type="number" id="aLo" placeholder="3350" oninput="calcADR()"></div>
      </div>
      <div class="adr-out" id="adrOut" style="display:none">
        <div class="adr-stat"><div class="adr-v" id="adrCur">—</div><div class="adr-l">Current Range</div></div>
        <div class="adr-stat"><div class="adr-v" id="adrRem">—</div><div class="adr-l">Remaining ADR</div></div>
      </div>
      <div id="adrMsg"></div>
    </div>`:'' ;

  rp.innerHTML=`<div class="rc">
    <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:6px">Today's conditions</div>
    <div class="sel-tags">${tags}</div>
    ${r.hardAvoid?`<div class="hard-avoid"><span class="ha-ico">⛔</span><span>${r.reason}</span></div>`:''}
    <div class="verdict-row">
      <div class="verdict ${vClass}">
        <div class="v-ico">${vIco}</div>
        <div>
          <div class="v-lbl">Statistical Bias</div>
          <div class="v-title" style="color:${vColor}">${biasLabel}</div>
          <div class="v-sub">${confNote}</div>
        </div>
      </div>
      <div class="grade-box ${gradeClass}"><div class="gb-g">${r.grade}</div><div class="gb-l">Grade</div></div>
    </div>
    ${conflictHTML}
    ${scoreHTML}
    <div class="cond-sec">
      <div class="sec-lbl">Condition breakdown</div>
      <div class="cond-list">${condHTML}</div>
    </div>
    ${adrHTML}
    <button class="reset-btn" onclick="resetAsset()">↺ Reset ${a.name}</button>
  </div>`;
}

function calcADR(){
  const adr=parseFloat(document.getElementById('aIn')?.value)||0;
  const hi=parseFloat(document.getElementById('aHi')?.value)||0;
  const lo=parseFloat(document.getElementById('aLo')?.value)||0;
  if(!adr||!hi||!lo||hi<=lo){
    document.getElementById('adrOut').style.display='none';
    document.getElementById('adrMsg').innerHTML='';
    return;
  }
  const cur=hi-lo, rem=Math.max(0,adr-cur);
  document.getElementById('adrOut').style.display='grid';
  const cv=document.getElementById('adrCur'), rv=document.getElementById('adrRem');
  cv.textContent='$'+cur.toFixed(0);
  rv.textContent='$'+rem.toFixed(0);
  cv.style.color=cur>adr*.8?'var(--bear)':cur>adr*.5?'var(--chop)':'var(--bull)';
  rv.style.color=rem>40?'var(--bull)':rem>20?'var(--chop)':'var(--bear)';
  let msg,clr;
  if(rem>40)      {msg=`✓ $${rem.toFixed(0)} remaining — full target viable`;clr='var(--bull)';}
  else if(rem>20) {msg=`⚠ $${rem.toFixed(0)} remaining — consider reduced target`;clr='var(--chop)';}
  else if(rem>10) {msg=`⚠ $${rem.toFixed(0)} remaining — range maturing, be cautious`;clr='var(--avoid)';}
  else            {msg=`✗ $${rem.toFixed(0)} remaining — avoid chasing, range consumed`;clr='var(--bear)';}
  document.getElementById('adrMsg').innerHTML=`<div class="adr-msg" style="color:${clr};background:${clr.replace(')',',0.08)').replace('var(','rgba(')}">${msg}</div>`;
}

function resetAsset(){
  sel[active]={};
  renderParams();
  renderResults();
}

// ═══════════════ INIT ═══════════════
(function(){
  const now=new Date();
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('todayLine').innerHTML=
    `<b>${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}</b> &nbsp;·&nbsp; London open: 08:00 UTC &nbsp;·&nbsp; NY open: 13:30 UTC`;
  document.documentElement.style.setProperty('--ac', ASSETS[active].color);
  document.getElementById('hdrTitle').textContent = ASSETS[active].name+' — Morning Bias';
  buildTabs();
  renderParams();
  renderResults();
})();
</script>
